# Build and publish the production test suite image (ghcr.io/<owner>/cmp-test:latest)
# on every push to main. This is the end-product for users who want to test their
# CMP implementations.
# Note: this workflow relies on branch protection rules requiring check_quality.yml
# jobs to pass before any PR can be merged into main.

name: Build and push suite Docker image

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: [ "Build and push base docker images" ]
    types: [ completed ]
  workflow_dispatch:

jobs:
  build_and_push:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Some contributors have names that contain upper-case characters, but
      # GHCR requires them to be lower-case, so we apply the change here
      - name: Set lowercase GitHub owner
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and push suite Docker image
        # This image is meant to be directly invoked by end-users who don't want
        # to get into the details of how the test suite works, they just want to
        # run it to test their CA. For their convenience, we give it a short name,
        # to be invoked as `docker run --rm -it ghcr.io/siemens/cmp-test`
        run: |
          docker buildx build \
            --tag ghcr.io/${REPO_OWNER_LC}/cmp-test:latest \
            --build-arg BASE_IMAGE=ghcr.io/${REPO_OWNER_LC}/cmp-test-base:latest \
            --push \
            -f data/dockerfiles/Dockerfile.tests .